name: Deploy to WordPress.org
on:
  release:
    types: [published]
jobs:
  tag:
    name: HENSHIN
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fix Git safe directory
        run: git config --global --add safe.directory /github/workspace

      - name: Read Stable Tag from readme.txt
        id: stable_tag
        env:
          GIT_TAG: ${{ github.ref_name }}
        run: |
          STABLE_TAG=$(grep -E "^Stable tag:" readme.txt | awk '{print $3}' | tr -d '[:space:]')
          if [ -z "$STABLE_TAG" ]; then
            echo "Could not find 'Stable tag:' in readme.txt"
            exit 1
          fi
          echo "version=$STABLE_TAG" >> "$GITHUB_OUTPUT"
          echo "Using SVN tag: $STABLE_TAG (from readme.txt, git tag was $GIT_TAG)"

      - name: WordPress Plugin Deploy
        uses: 10up/action-wordpress-plugin-deploy@stable
        env:
          SVN_PASSWORD: ${{ secrets.SVN_PASSWORD }}
          SVN_USERNAME: ${{ secrets.SVN_USERNAME }}
          SLUG: ${{ secrets.SLUG }}
          VERSION: ${{ steps.stable_tag.outputs.version }}
